name: Frogbot Race Condition Test
on:
  workflow_dispatch:  # Manual trigger
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # First scan - may hit cold cache
  frogbot-scan-1:
    runs-on: ubuntu-latest
    environment: frogbot
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pip install poetry

      - name: Run Frogbot PR Scan (Run 1)
        id: scan1
        continue-on-error: true  # Don't fail workflow, we want to compare
        uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # JF_WATCHES: "your-watch-name"

      - name: Record Run 1 Result
        run: |
          echo "Run 1 exit code: ${{ steps.scan1.outcome }}"
          echo "RUN1_RESULT=${{ steps.scan1.outcome }}" >> $GITHUB_ENV

  # Wait and run again - should hit warm cache
  frogbot-scan-2:
    runs-on: ubuntu-latest
    needs: frogbot-scan-1
    environment: frogbot
    steps:
      - name: Wait for CA to settle
        run: sleep 60  # Wait 60 seconds for Contextual Analysis to complete

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pip install poetry

      - name: Run Frogbot PR Scan (Run 2)
        id: scan2
        continue-on-error: true
        uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # JF_WATCHES: "your-watch-name"

      - name: Record Run 2 Result
        run: |
          echo "Run 2 exit code: ${{ steps.scan2.outcome }}"
          echo "RUN2_RESULT=${{ steps.scan2.outcome }}" >> $GITHUB_ENV

  # Compare results
  compare-results:
    runs-on: ubuntu-latest
    needs: [frogbot-scan-1, frogbot-scan-2]
    steps:
      - name: Compare Scan Results
        run: |
          echo "============================================"
          echo "RACE CONDITION TEST RESULTS"
          echo "============================================"
          echo "If Run 1 FAILED and Run 2 PASSED, the race condition is confirmed."
          echo ""
          echo "Run 1: ${{ needs.frogbot-scan-1.result }}"
          echo "Run 2: ${{ needs.frogbot-scan-2.result }}"
          echo "============================================"
