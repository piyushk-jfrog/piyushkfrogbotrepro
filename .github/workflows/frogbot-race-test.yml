name: Frogbot Race Condition Test
on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  frogbot-scan-1:
    runs-on: ubuntu-latest
    environment: frogbot
    outputs:
      result: ${{ steps.scan1.outcome }}
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pip install poetry

      - name: Run Frogbot PR Scan (Run 1 - Cold Cache)
        id: scan1
        continue-on-error: true
        uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_FAIL: "true"

      - name: Record Run 1 Result
        if: always()
        run: |
          echo "============================================"
          echo "RUN 1 RESULT: ${{ steps.scan1.outcome }}"
          echo "============================================"

  frogbot-scan-2:
    runs-on: ubuntu-latest
    needs: frogbot-scan-1
    environment: frogbot
    outputs:
      result: ${{ steps.scan2.outcome }}
    steps:
      - name: Wait 90s for CA data to settle in Xray
        run: |
          echo "Waiting 90 seconds for Contextual Analysis data to be persisted..."
          sleep 90

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pip install poetry

      - name: Run Frogbot PR Scan (Run 2 - Warm Cache)
        id: scan2
        continue-on-error: true
        uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_FAIL: "true"

      - name: Record Run 2 Result
        if: always()
        run: |
          echo "============================================"
          echo "RUN 2 RESULT: ${{ steps.scan2.outcome }}"
          echo "============================================"

  compare-results:
    runs-on: ubuntu-latest
    needs: [frogbot-scan-1, frogbot-scan-2]
    if: always()
    steps:
      - name: Compare Scan Results
        run: |
          echo "============================================"
          echo "RACE CONDITION TEST RESULTS"
          echo "============================================"
          echo "Run 1 (Cold Cache): ${{ needs.frogbot-scan-1.outputs.result || needs.frogbot-scan-1.result }}"
          echo "Run 2 (Warm Cache): ${{ needs.frogbot-scan-2.outputs.result || needs.frogbot-scan-2.result }}"
          echo "============================================"
          echo ""
          if [ "${{ needs.frogbot-scan-1.result }}" = "failure" ] && [ "${{ needs.frogbot-scan-2.result }}" = "success" ]; then
            echo "RACE CONDITION CONFIRMED!"
            echo "Run 1 FAILED (violations found on cold cache)"
            echo "Run 2 PASSED (no violations after CA data settled)"
          elif [ "${{ needs.frogbot-scan-1.result }}" = "success" ] && [ "${{ needs.frogbot-scan-2.result }}" = "success" ]; then
            echo "NO RACE CONDITION - Both runs passed (CA data may already be cached)"
          elif [ "${{ needs.frogbot-scan-1.result }}" = "failure" ] && [ "${{ needs.frogbot-scan-2.result }}" = "failure" ]; then
            echo "BOTH FAILED - Violations are persistent (likely 'Not Covered' CVEs, not race condition)"
          else
            echo "UNEXPECTED RESULT - Investigate logs"
          fi
